<div class="min-h-screen bg-[#0d0d0d] flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Background grid -->
  <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px); background-size: 40px 40px;"></div>

  <!-- Glow accents -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#e53935] rounded-full opacity-[0.04] blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-[#e53935] rounded-full opacity-[0.03] blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md relative z-10">
    
    <!-- Logo mark -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-[#e53935] shadow-2xl shadow-red-900/50 mb-5">
        <span class="text-white font-black text-2xl">B</span>
      </div>
      <h1 class="text-3xl font-black text-white tracking-tight">BrandShift</h1>
      <p class="text-sm text-white/30 mt-1.5 font-medium">Team Task Management</p>
    </div>

    <!-- Card -->
    <div class="bg-[#111111] border border-white/8 rounded-2xl p-8 shadow-2xl">
      <!-- Force rebuild comment -->
      <h2 class="text-lg font-black text-white mb-1">Sign in to your account</h2>
      <p class="text-sm text-white/30 mb-7">Enter your credentials to access the platform</p>

      <!-- Error -->
      <div *ngIf="errorMsg" class="mb-5 p-3.5 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        {{errorMsg}}
      </div>

      <form (ngSubmit)="login()" class="space-y-4">
        <div>
          <label class="text-[10px] text-white/30 uppercase tracking-widest font-bold block mb-1.5">Username</label>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="your_username"
            required
            autocomplete="username"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:border-[#e53935]/50 focus:bg-white/8 focus:outline-none transition-all text-sm font-medium">
        </div>

        <div>
          <label class="text-[10px] text-white/30 uppercase tracking-widest font-bold block mb-1.5">Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:border-[#e53935]/50 focus:bg-white/8 focus:outline-none transition-all text-sm font-medium">
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-[#e53935] hover:bg-[#c62828] text-white font-black py-3.5 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed text-sm flex items-center justify-center gap-2 shadow-lg shadow-red-900/30 mt-2">
          <svg *ngIf="isLoading" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
        </button>
      </form>
    </div>

    <!-- Footer note -->
    <p class="text-center text-[10px] text-white/15 mt-6 font-medium">
      BrandShift · Team Task Management Platform
    </p>
  </div>
</div>
