<div class="space-y-8 animate-in fade-in zoom-in-95 max-w-[1200px] mx-auto pb-20">
    <div class="flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-black text-white italic tracking-tight uppercase">My Individual Tasks</h1>
          <p class="text-xs text-white/40 mt-1 uppercase tracking-widest font-bold">Manage your personal responsibilities and standalone items</p>
        </div>
        <div class="px-5 py-2.5 bg-white/5 border border-white/10 rounded-2xl">
            <span class="text-xs font-black text-white uppercase tracking-widest">{{tasks.length}} Active</span>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4">
        <div *ngFor="let t of tasks" class="bg-[#161616] border border-white/5 rounded-2xl p-6 flex items-center justify-between hover:border-white/10 transition-all group shadow-xl">
            <div class="flex-1 min-w-0 pr-8">
                <div class="flex items-center gap-3 mb-2">
                    <span class="w-1.5 h-1.5 rounded-full" [class]="t.status === 'DONE' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]' : 'bg-[#e53935] animate-pulse'"></span>
                    <span class="text-[9px] font-black text-white/20 uppercase tracking-widest">{{t.status}}</span>
                </div>
                <h3 class="text-lg font-bold text-white mb-1 group-hover:text-[#e53935] transition-colors" [class.line-through]="t.status === 'DONE'" [class.opacity-30]="t.status === 'DONE'">
                    {{t.title}}
                </h3>
                <p class="text-xs text-white/30 truncate font-medium" [class.opacity-20]="t.status === 'DONE'">{{t.description || 'No description provided.'}}</p>
            </div>

            <div class="flex items-center gap-6 shrink-0">
                <div class="flex flex-col items-end">
                    <p class="text-[9px] font-black text-white/10 uppercase tracking-widest mb-2">Change Status</p>
                    <div class="flex gap-2">
                        <button (click)="updateStatus(t.id, 'IN_PROGRESS')" 
                                [disabled]="t.status === 'DONE'"
                                class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all border"
                                [class]="t.status === 'IN_PROGRESS' ? 'bg-orange-500 text-white border-orange-500' : 'bg-white/5 text-white/40 border-white/5 hover:bg-white/10'">
                            Busy
                        </button>
                        <button (click)="updateStatus(t.id, 'DONE')" 
                                class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase transition-all border"
                                [class]="t.status === 'DONE' ? 'bg-green-500 text-white border-green-500' : 'bg-white/5 text-white/40 border-white/5 hover:bg-white/10'">
                            Done
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="tasks.length === 0" class="text-center py-24 bg-[#111] rounded-3xl border border-dashed border-white/5">
        <div class="w-16 h-16 bg-gradient-to-br from-green-500/10 to-green-900/10 rounded-2xl flex items-center justify-center mx-auto mb-6">
           <svg class="w-8 h-8 text-green-500/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-xl font-black text-white italic mb-2 uppercase">Inbox Zero</h2>
        <p class="text-sm text-white/30 italic">No standalone tasks assigned to you. Great job!</p>
    </div>
</div>
