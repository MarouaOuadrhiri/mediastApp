<div class="space-y-8 animate-in fade-in zoom-in-95 max-w-[1400px] mx-auto">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-black text-white italic tracking-tight uppercase">My Team</h1>
      <p class="text-sm text-white/40 font-medium mt-1">Department: <span class="text-[#e53935] font-bold">{{departmentName || 'Loading...'}}</span></p>
    </div>
    <div class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-[10px] font-black text-white/40 uppercase tracking-widest">
        {{team.length}} Members
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    <div *ngFor="let member of team" 
         class="bg-[#17171780] border border-white/5 rounded-2xl p-6 flex items-center gap-4 hover:border-white/10 transition-all group shadow-lg hover:-translate-y-1">
      <div class="w-16 h-16 rounded-2xl overflow-hidden bg-gradient-to-br from-[#e53935] to-[#b71c1c] flex items-center justify-center text-white font-black text-xl border border-white/10 shrink-0 shadow-xl group-hover:scale-105 transition-transform">
        <img *ngIf="member.profile_photo" [src]="member.profile_photo" class="w-full h-full object-cover">
        <span *ngIf="!member.profile_photo">{{(member.first_name || 'U').charAt(0).toUpperCase()}}</span>
      </div>
      <div class="min-w-0 flex-1">
        <h3 class="text-white font-bold text-base truncate group-hover:text-[#e53935] transition-colors">
            {{member.first_name || 'User'}} {{member.last_name || ''}}
        </h3>
        <p class="text-white/30 text-[10px] truncate mb-3 lowercase font-medium tracking-wide">{{member.email}}</p>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full" [class]="member.is_online ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-white/10'"></span>
          <span class="text-[9px] uppercase tracking-wider font-black text-white/40">
              {{member.is_online ? 'Online' : 'Offline'}}
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="team.length === 0" class="text-center py-20 bg-[#17171740] rounded-3xl border border-dashed border-white/5">
      <p class="text-white/20 font-bold italic">No teammates found in your department.</p>
  </div>
</div>
