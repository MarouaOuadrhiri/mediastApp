<div class="flex h-screen bg-[#213448] text-[#EAE0CF] font-sans overflow-hidden">
    <!-- Sidebar -->
    <aside [class]="showSidebar ? 'flex absolute md:relative w-72 h-full z-50' : 'hidden md:flex w-72'"
             class="flex-col bg-[#1b2a3a] border-r border-[#547792]/30 shadow-2xl shrink-0 transition-all">

        <!-- Logo -->
        <div class="px-7 py-8">
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-[#547792] to-[#94B4C1] flex items-center justify-center shadow-lg shadow-[#547792]/30 shrink-0">
              <span class="text-[#213448] font-black">M</span>
            </div>
            <div>
              <p class="font-black text-[#EAE0CF] text-lg tracking-tight leading-none">Mediast</p>
              <p class="text-[10px] uppercase tracking-[0.2em] text-[#94B4C1] font-bold mt-0.5">Admin</p>
            </div>
            <button (click)="showSidebar = false" class="md:hidden p-2 text-[#94B4C1] hover:text-[#EAE0CF] ml-auto">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
          </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-4 space-y-2 relative z-10">
          <p class="text-[10px] uppercase tracking-[0.2em] text-[#94B4C1]/60 font-bold px-3 mb-3 mt-2">Navigation</p>
          <a routerLink="departments" routerLinkActive="bg-[#547792]/20 text-[#EAE0CF] border-[#94B4C1]/50" 
             class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-sm font-semibold transition-all text-[#94B4C1] hover:bg-[#547792]/10 hover:text-[#EAE0CF] cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            Departments
          </a>
          <a routerLink="employees" routerLinkActive="bg-[#547792]/20 text-[#EAE0CF] border-[#94B4C1]/50" 
             class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-sm font-semibold transition-all text-[#94B4C1] hover:bg-[#547792]/10 hover:text-[#EAE0CF] cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            Employees
          </a>
          <a routerLink="projects" routerLinkActive="bg-[#547792]/20 text-[#EAE0CF] border-[#94B4C1]/50" 
             class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-sm font-semibold transition-all text-[#94B4C1] hover:bg-[#547792]/10 hover:text-[#EAE0CF] cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
            Projects
          </a>
          <a routerLink="tasks" routerLinkActive="bg-[#547792]/20 text-[#EAE0CF] border-[#94B4C1]/50" 
             class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-sm font-semibold transition-all text-[#94B4C1] hover:bg-[#547792]/10 hover:text-[#EAE0CF] cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            Tasks
          </a>
          <a routerLink="profile" routerLinkActive="bg-[#547792]/20 text-[#EAE0CF] border-[#94B4C1]/50" 
             class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-sm font-semibold transition-all text-[#94B4C1] hover:bg-[#547792]/10 hover:text-[#EAE0CF] cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            My Profile
          </a>
        </nav>

        <div class="p-4 relative z-10">
          <button (click)="logout()" class="w-full px-4 py-3 bg-[#547792]/20 text-[#94B4C1] border border-[#547792]/30 hover:bg-[#547792]/40 hover:text-[#EAE0CF] rounded-xl transition-all font-semibold text-sm flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Log Out
          </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Top bar -->
        <header class="flex items-center justify-between px-8 py-5 bg-[#213448] border-b border-[#547792]/30 shrink-0 shadow-sm z-10 fade-down">
          <div class="flex items-center gap-4">
            <button (click)="showSidebar = !showSidebar" class="md:hidden p-2 text-[#94B4C1] hover:text-[#EAE0CF]">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div>
              <h2 class="text-xl font-black text-[#EAE0CF]">Admin Portal</h2>
              <p class="text-xs text-[#94B4C1] mt-0.5">Manage your workspace seamlessly</p>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button routerLink="profile" class="w-9 h-9 rounded-full bg-gradient-to-tr from-[#547792] to-[#94B4C1] flex items-center justify-center text-[#213448] font-black text-sm transition-all hover:scale-105 shadow-md">A</button>
          </div>
        </header>

        <!-- Content area -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-gradient-to-br from-[#213448] to-[#1b2a3a]">
          <router-outlet></router-outlet>
        </div>
    </main>
</div>
