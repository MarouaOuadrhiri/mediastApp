<div *ngIf="showProjectModal" class="modal-overlay fixed inset-0 z-[1000] flex items-center justify-center px-4 py-6 bg-black/70 backdrop-blur-md">
  <div class="modal-panel w-full max-w-3xl rounded-[2rem] bg-[#121212] border border-white/10 shadow-[0_32px_120px_rgba(0,0,0,0.45)] overflow-hidden flex flex-col max-h-[90vh]">
    
    <!-- Fixed Header -->
    <div class="flex items-center justify-between gap-4 border-b border-white/10 px-8 py-6 shrink-0 bg-[#121212]">
      <div>
        <p class="text-xs uppercase tracking-[0.35em] text-white/40 mb-1">{{ isEditingMode ? 'Edit Project' : 'Create Project' }}</p>
        <h2 class="text-2xl font-black text-white">{{ isEditingMode ? 'Update Project' : 'New Project' }}</h2>
      </div>
      <button type="button" (click)="closeModal()" class="text-white/40 hover:text-white transition-all">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>

    <!-- Scrollable Content -->
    <div class="px-8 py-8 overflow-y-auto custom-scrollbar flex-1 bg-[#121212]">
      <form (ngSubmit)="submitProject()" id="projectForm" class="space-y-8">
        <div class="grid gap-8 lg:grid-cols-2">
          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Project Name</label>
            <input type="text" [(ngModel)]="projectName" name="projectName" placeholder="e.g. Website Redesign" required
              class="w-full bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white placeholder-white/30 focus:border-[#E53935]/50 focus:outline-none transition-all text-sm" />
          </div>
          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Client Name</label>
            <input type="text" [(ngModel)]="projectClient" name="projectClient" placeholder="e.g. Acme Corp"
              class="w-full bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white placeholder-white/30 focus:border-[#E53935]/50 focus:outline-none transition-all text-sm" />
          </div>
        </div>
        
        <div class="grid gap-8 lg:grid-cols-2">
          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Deadline</label>
            <input type="datetime-local" [(ngModel)]="projectDeadline" name="projectDeadline" required
              class="w-full bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white placeholder-white/30 focus:border-[#E53935]/50 focus:outline-none transition-all text-sm" />
          </div>
          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Department</label>
            <select [(ngModel)]="projectDepartmentId" name="projectDepartmentId" (change)="onDepartmentChange()"
              class="w-full bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white focus:border-[#E53935]/50 focus:outline-none transition-all text-sm cursor-pointer">
              <option value="" class="bg-[#121212]">No department</option>
              <option *ngFor="let d of departments" [value]="d.id" class="bg-[#121212]">{{ d.name }}</option>
            </select>
          </div>
        </div>

        <div class="space-y-3">
          <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Description</label>
          <textarea [(ngModel)]="projectDesc" name="projectDesc" rows="4" placeholder="Project goals and scope..."
            class="w-full bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white placeholder-white/30 focus:border-[#E53935]/50 focus:outline-none transition-all text-sm resize-none"></textarea>
        </div>

        <div class="grid gap-8 lg:grid-cols-2">
          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Department</label>
            <select [(ngModel)]="projectDepartmentId" name="projectDepartmentId" (change)="onDepartmentChange()"
              class="w-full bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white focus:border-[#E53935]/50 focus:outline-none transition-all text-sm cursor-pointer">
              <option value="" class="bg-[#121212]">No department</option>
              <option *ngFor="let d of departments" [value]="d.id" class="bg-[#121212]">{{ d.name }}</option>
            </select>
          </div>
          <div class="space-y-3">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Assign Employees</label>
            <select multiple [(ngModel)]="projectEmployeeIds" name="projectEmployeeIds"
              class="w-full min-h-[160px] bg-[#111111] border border-white/10 rounded-3xl px-6 py-4 text-white focus:border-[#E53935]/50 focus:outline-none transition-all text-sm cursor-pointer custom-scrollbar">
              <option *ngFor="let e of filteredEmployees" [value]="e.id" class="bg-[#121212]">{{ e.username }} ({{ e.department_name || 'No Dept' }})</option>
            </select>
          </div>
        </div>

        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <label class="text-[10px] uppercase tracking-[0.28em] text-white/40">Tasks Checklist</label>
            <button type="button" (click)="addProjectTask()" class="text-xs font-black uppercase tracking-[0.28em] text-[#E53935] hover:text-white transition-all">Add Task Item</button>
          </div>
          <div class="space-y-4">
            <div *ngFor="let task of projectTasks; let i = index" class="rounded-[1.5rem] border border-white/10 bg-[#111111] p-5">
              <div class="flex gap-4 items-start">
                <input type="text" [(ngModel)]="projectTasks[i].title" [name]="'pt_' + i" placeholder="Task title"
                  class="flex-1 bg-transparent border border-white/10 rounded-2xl px-5 py-3 text-white placeholder-white/30 focus:border-[#E53935]/50 focus:outline-none transition-all text-sm" />
                <button type="button" (click)="removeProjectTask(i)" class="text-white/20 hover:text-red-400 mt-3 transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
              </div>
              <input type="text" [(ngModel)]="projectTasks[i].note" [name]="'pt_note_' + i" placeholder="Notes or instructions..."
                class="w-full bg-transparent border border-white/10 rounded-2xl px-5 py-3 text-white/50 placeholder-white/30 focus:border-white/20 focus:outline-none transition-all text-[13px] mt-4" />
            </div>
            <div *ngIf="projectTasks.length === 0" class="rounded-3xl border border-dashed border-white/10 bg-[#101010] px-6 py-10 text-center text-sm text-white/30">No tasks defined for this project.</div>
          </div>
        </div>
      </form>
    </div>

    <!-- Fixed Footer -->
    <div class="px-8 py-6 border-t border-white/10 shrink-0 bg-[#121212]">
      <div class="flex flex-col gap-4 sm:flex-row sm:justify-end">
        <div *ngIf="errorMsg" class="flex-1 text-sm text-red-400 self-center">{{ errorMsg }}</div>
        <button type="button" (click)="closeModal()" class="w-full sm:w-auto rounded-3xl border border-white/10 bg-white/5 px-8 py-4 text-xs font-black uppercase tracking-[0.2em] text-white/60 hover:bg-white/10 transition-all">Cancel</button>
        <button type="submit" form="projectForm" [disabled]="isSubmitting" class="w-full sm:w-auto rounded-3xl bg-[#E53935] px-8 py-4 text-xs font-black uppercase tracking-[0.2em] text-white hover:bg-[#d32f2f] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isEditingMode ? 'Save Project' : 'Create Project' }}
        </button>
      </div>
    </div>

  </div>
</div>
